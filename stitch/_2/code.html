<div class="flex items-center">
<span class="font-label-md text-label-md text-primary px-3 py-1 bg-surface-container-high border-2 border-outline-variant rounded-DEFAULT shadow-[2px_2px_0px_0px_rgba(136,81,32,0.2)]">7 🔥</span>
</div>
<!-- Desktop Nav Items -->
<nav class="hidden md:flex gap-gutter items-center ml-gutter">
<a class="font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high transition-colors px-3 py-2 rounded-DEFAULT" href="#">Home</a>

</nav>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop py-8">
<header class="mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-2">Daily Habits</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Build your future, one block at a time.</p>
</header>
<!-- Timeline / List Container -->
<div class="flex flex-col gap-gutter mb-12 relative">
<!-- Vertical Timeline Line (Desktop/Tablet) -->
<div class="hidden md:block absolute left-8 top-8 bottom-8 w-1 bg-outline-variant -z-10 rounded-full"></div>
<!-- Habit Item: Completed -->
<div class="bg-surface-container-low border-2 border-outline-variant p-4 flex items-center gap-6 rounded-lg shadow-none active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all md:ml-4">
<div class="text-secondary bg-secondary-container w-10 h-10 rounded-full flex items-center justify-center border-2 border-secondary shrink-0">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface line-through opacity-70">Wake Up</h3>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">7:30 AM</p>
</div>
<div class="hidden md:block w-16 h-2 bg-secondary rounded-DEFAULT shrink-0 border border-outline"></div>
</div>
<!-- Habit Item: Active -->
<div class="bg-surface border-2 border-secondary p-4 flex items-center gap-6 rounded-lg shadow-[4px_4px_0px_0px_rgba(136,81,32,0.2)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all md:ml-4">
<div class="text-on-surface-variant bg-surface w-10 h-10 rounded-full flex items-center justify-center border-2 border-outline-variant shrink-0 hover:bg-surface-container-high cursor-pointer transition-colors">
<span class="material-symbols-outlined" data-icon="star" style="font-variation-settings: 'FILL' 0;">star</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Morning Reading</h3>
<p class="font-body-md text-body-md text-on-surface-variant">8:30 AM</p>
</div>
<div class="hidden md:block w-16 h-2 bg-outline-variant rounded-DEFAULT shrink-0"></div>
</div>
<!-- Habit Item: Upcoming -->
<div class="bg-surface border-2 border-outline-variant p-4 flex items-center gap-6 rounded-lg shadow-[4px_4px_0px_0px_rgba(136,81,32,0.2)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all md:ml-4">
<div class="text-on-surface-variant bg-surface w-10 h-10 rounded-full flex items-center justify-center border-2 border-outline-variant shrink-0 hover:bg-surface-container-high cursor-pointer transition-colors">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 0;">favorite</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Exercise</h3>
<p class="font-body-md text-body-md text-on-surface-variant">18:00 PM</p>
</div>
<div class="hidden md:block w-16 h-2 bg-outline-variant rounded-DEFAULT shrink-0"></div>
</div>
<!-- Habit Item: Upcoming -->
<div class="bg-surface border-2 border-outline-variant p-4 flex items-center gap-6 rounded-lg shadow-[4px_4px_0px_0px_rgba(136,81,32,0.2)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all md:ml-4">
<div class="text-on-surface-variant bg-surface w-10 h-10 rounded-full flex items-center justify-center border-2 border-outline-variant shrink-0 hover:bg-surface-container-high cursor-pointer transition-colors">
<span class="material-symbols-outlined" data-icon="star" style="font-variation-settings: 'FILL' 0;">star</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Clean Playroom</h3>
<p class="font-body-md text-body-md text-on-surface-variant">19:30 PM</p>
</div>
<div class="hidden md:block w-16 h-2 bg-outline-variant rounded-DEFAULT shrink-0"></div>
</div>
</div>

<div class="flex justify-center mt-8">
<button class="bg-primary-container text-on-primary-container font-label-md text-label-md px-8 py-4 rounded-DEFAULT border-2 border-on-surface shadow-[4px_4px_0px_0px_rgba(29,28,21,1)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all flex items-center gap-2 hover:bg-primary-container/90">
<span class="material-symbols-outlined" data-icon="add">add</span>

            </button>
</div>
